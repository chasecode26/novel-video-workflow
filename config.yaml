# Provider-based sample config for Windows-friendly local development.
# Legacy keys like tts.engine, subtitle.generator, drawthings.api_url, and indextts2.api_url were removed.

paths:
  base_dir: ./workspace
  novel_source: ./novels
  reference_audio: ./assets/ref_audio/ref.m4a
  output_template: chapter_{chapter:02d}

workflow:
  max_concurrent: 2
  retry_attempts: 3
  cleanup_temp: true

tts:
  provider: windows-indextts2
  python_path: python
  indextts_path: ./tools/indexTTS
  voice_model: default
  sample_rate: 24000
  indextts2:
    api_url: http://127.0.0.1:7860
    timeout_seconds: 300
    max_retries: 3

subtitle:
  provider: windows-aegisub
  style: Default
  font_name: Microsoft YaHei
  font_size: 48
  primary_color: "&H00FFFFFF"
  secondary_color: "&H0000FFFF"
  outline_color: "&H00000000"
  back_color: "&H80000000"
  bold: true
  italic: false
  underline: false
  alignment: 2
  margin_l: 20
  margin_r: 20
  margin_v: 20
  outline: 2.0
  shadow: 1.0
  max_chars_per_line: 40
  min_display_time: 2.0
  max_display_time: 8.0
  line_interval: 0.1
  aegisub:
    executable_path: C:/Program Files/Aegisub/aegisub64.exe
    script_path: ./pkg/tools/aegisub/aegisub_subtitle_gen.sh
    use_automation: true

image:
  provider: comfyui
  width: 512
  height: 896
  steps: 30
  cfg_scale: 7.5
  style_preset: suspense_horror
  negative_prompt: low quality, blurry, distorted, bright lighting, cheerful atmosphere
  drawthings:
    api_url: http://127.0.0.1:7861
    model: dreamshaper_8.safetensors
    scheduler: DPM++ 2M Trailing
  comfyui:
    api_url: http://127.0.0.1:8188
    checkpoint: dreamshaper-8-1.5.safetensors
    output_node_id: "9"
    filename_prefix: novel_workflow

project:
  provider: windows-capcut

database:
  path: ./db.sqlite

ollama:
  api_url: http://127.0.0.1:11434
  model: qwen3.5:9b
  timeout_seconds: 120
  max_tokens: 2048
  temperature: 0.7
